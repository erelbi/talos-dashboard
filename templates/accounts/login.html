<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Talos Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-dark">
  <div class="card" style="width:400px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-hdd-stack-fill text-primary" style="font-size:2.5rem"></i>
        <h4 class="mt-2 fw-bold">Talos Dashboard</h4>
        <p class="text-muted small">Sign in to continue</p>
      </div>

      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-{% if 'error' in msg.tags %}danger{% elif 'success' in msg.tags %}success{% elif 'warning' in msg.tags %}warning{% else %}info{% endif %} py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}

      {% if oidc_enabled %}
      <!-- SSO Login (primary action) -->
      <a href="{% url 'oidc_authentication_init' %}" class="btn btn-primary w-100 py-2 mb-3">
        <i class="bi bi-shield-lock me-2"></i> Sign in with Keycloak (SSO)
      </a>

      <!-- Divider -->
      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1">
        <span class="mx-3 text-muted small">or</span>
        <hr class="flex-grow-1">
      </div>
      {% endif %}

      <!-- Local login form -->
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="id_username">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person" aria-hidden="true"></i></span>
            <input type="text" name="username" id="id_username" class="form-control" required {% if not oidc_enabled %}autofocus{% endif %} autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label" for="id_password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock" aria-hidden="true"></i></span>
            <input type="password" name="password" id="id_password" class="form-control" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn {% if oidc_enabled %}btn-outline-secondary{% else %}btn-primary{% endif %} w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
        </button>
      </form>

      {% if ldap_enabled %}
      <div class="text-center mt-3">
        <span class="text-muted small">
          <i class="bi bi-diagram-3 me-1"></i> LDAP credentials are accepted
        </span>
      </div>
      {% endif %}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
